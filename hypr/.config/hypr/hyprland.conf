dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
}

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER
$terminal = ghostty

# ── Applications ────────────────────────────────
bind = $mainMod, Q, exec, uwsm app -- $terminal
bind = $mainMod, B, exec, uwsm app -- firefox -private-window
bind = $mainMod, E, exec, uwsm app -- thunar
bind = $mainMod, R, exec, uwsm app -- rofi -show drun

# ── Windows ─────────────────────────────────────
bind = $mainMod, W, killactive,
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, M, fullscreen, 1
bind = $mainMod, T, togglefloating,
bind = $mainMod, J, layoutmsg, togglesplit # dwindle
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod SHIFT, right, resizeactive, 100 0
bind = $mainMod SHIFT, left, resizeactive, -100 0
bind = $mainMod SHIFT, down, resizeactive, 0 100
bind = $mainMod SHIFT, up, resizeactive, 0 -100

# ── Lock ────────────────────────────────────────
bind = $mainMod, L, exec, uwsm app -- hyprlock

# ── Screenshots ─────────────────────────────────
bind = , Print, exec, uwsm app -- sh -c "grim -g \"$(slurp)\" - | wl-copy && notify-send 'Copied Area'"

# ── Clipboard ───────────────────────────────────
bind = $mainMod, V, exec, uwsm app -- sh -c "cliphist list | rofi -dmenu | cliphist decode | wl-copy"

# ── Audio (via SwayOSD) ─────────────────────────
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume +5
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume -5
bindel = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle

# ── Media ───────────────────────────────────────
bindl = , XF86AudioNext, exec, swayosd-client --playerctl next
bindl = , XF86AudioPause, exec, swayosd-client --playerctl play-pause
bindl = , XF86AudioPlay, exec, swayosd-client --playerctl play-pause
bindl = , XF86AudioPrev, exec, swayosd-client --playerctl previous

# ── Workspaces ──────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

#############
### INPUT ###
#############
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}

##############################
### WINDOWS AND WORKSPACES ###
##############################
windowrule {
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}

# ── Inhibit idle when fullscreen ────────────────
windowrule = idle_inhibit fullscreen, match:class ([window])

# ── Float file picker dialogs ───────────────────
windowrule = float 1, match:tag floating-window
windowrule = center 1, match:tag floating-window
windowrule = size 800 600, match:tag floating-window
windowrule = tag +floating-window, match:class ^(local\.xdg-desktop-portal-gtk)$, match:title ^(Open.*Files?|Save.*Files?|Save.*As|Save|All Files)$

# ── No transparency on media windows ────────────
windowrule = opacity 1 1, match:class ^(vlc|mpv|com.obsproject.Studio)$

layerrule = blur 1, match:namespace ^(waybar)$
layerrule = ignore_alpha 1, match:namespace ^(waybar)$
layerrule = blur 1, match:namespace ^(notifications)$
layerrule = ignore_alpha 0.5, match:namespace ^(notifications)$
layerrule = blur 1, match:namespace ^(rofi)$
layerrule = ignore_alpha 0.41, match:namespace ^(rofi)$